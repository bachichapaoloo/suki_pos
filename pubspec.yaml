name: suki_pos
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter_bloc: ^8.1.6       # state management
  get_it: ^7.7.0             # dependency injection
  sqflite: ^2.3.3            # SQLite (your normalized schema)
  path: ^1.9.0               # DB path helper
  dartz: ^0.10.1             # Either / Option for error handling
  equatable: ^2.0.5          # value equality on entities
  intl: ^0.19.0              # currency / date formatting
  go_router: ^14.2.7         # Play Store-grade navigation
  flutter_secure_storage: ^9.2.2  # PIN / password storage
  printing: ^5.13.2          # ESC/POS receipt printing
  blue_thermal_printer: ^1.1.3   # Bluetooth printer
  web_socket_channel: ^3.0.1 # KDS real-time channel
  supabase_flutter: ^2.5.6   # cloud sync backend
  firebase_crashlytics: ^4.1.3   # required for Play Store quality

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0  # strict lint rules
  
flutter:
  uses-material-design: true
